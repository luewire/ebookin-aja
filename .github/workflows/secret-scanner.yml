name: 🔒 Security - Secret Scanner

on:
  push:
    branches: ['main', 'develop', 'master']
  pull_request:
    branches: ['main', 'develop', 'master']

jobs:
  scan-secrets:
    name: Scan for Exposed Secrets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better scanning

      - name: 🔍 Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for exposed secrets..."
          
          # Exit codes
          FOUND_SECRETS=0
          
          # Scan for JWT-like tokens (Supabase keys, etc.)
          echo "📝 Checking for JWT tokens..."
          if grep -rE 'eyJ[A-Za-z0-9_-]{40,}' \
            --exclude-dir={.git,node_modules,.next,out,build,coverage} \
            --exclude='*.{md,txt,json,lock,log}' \
            --exclude='.env.example' \
            --exclude='secret-scanner.yml' \
            . ; then
            echo "❌ ERROR: Found JWT-like tokens in code!"
            echo "   These should be in environment variables, not committed to git."
            FOUND_SECRETS=1
          else
            echo "✅ No JWT tokens found in code"
          fi
          
          # Scan for service_role keyword
          echo ""
          echo "📝 Checking for 'service_role' references..."
          if grep -ri 'service_role' \
            --exclude-dir={.git,node_modules,.next,out,build,coverage} \
            --exclude='*.{md,txt,json,lock,log}' \
            --exclude='.env.example' \
            --exclude='secret-scanner.yml' \
            . | grep -v 'process.env.SUPABASE_SERVICE_ROLE_KEY' | grep -v '// ' | grep -v 'SUPABASE_SERVICE_ROLE_KEY=' ; then
            echo "❌ ERROR: Found 'service_role' in unexpected places!"
            echo "   Service role keys should only be used via process.env in API routes."
            FOUND_SECRETS=1
          else
            echo "✅ No unsafe service_role references"
          fi
          
          # Scan for NEXT_PUBLIC_ on sensitive vars
          echo ""
          echo "📝 Checking for NEXT_PUBLIC_ misuse..."
          if grep -ri 'NEXT_PUBLIC_.*SERVICE_ROLE' \
            --exclude-dir={.git,node_modules,.next,out,build,coverage} \
            . ; then
            echo "❌ ERROR: SERVICE_ROLE_KEY has NEXT_PUBLIC_ prefix!"
            echo "   This exposes admin credentials to the browser. Remove NEXT_PUBLIC_ prefix."
            FOUND_SECRETS=1
          else
            echo "✅ No NEXT_PUBLIC_ prefix on sensitive keys"
          fi
          
          # Check for committed .env.local
          echo ""
          echo "📝 Checking for committed environment files..."
          if git ls-files | grep -E '\.(env\.local|env\.production\.local|secrets\.env)$' ; then
            echo "❌ ERROR: .env.local or secrets file committed to git!"
            echo "   Remove these files immediately and rotate your keys."
            FOUND_SECRETS=1
          else
            echo "✅ No .env.local files committed"
          fi
          
          # Check for Supabase URLs with embedded credentials
          echo ""
          echo "📝 Checking for database URLs with passwords..."
          if grep -rE 'postgresql://.*:[^@]*@' \
            --exclude-dir={.git,node_modules,.next,out,build,coverage} \
            --exclude='*.{md,txt,json,lock,log}' \
            --exclude='.env.example' \
            . ; then
            echo "❌ ERROR: Found database connection strings with passwords!"
            echo "   Use environment variables for database credentials."
            FOUND_SECRETS=1
          else
            echo "✅ No hardcoded database credentials"
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ $FOUND_SECRETS -eq 1 ]; then
            echo "❌ SECRET SCAN FAILED - Secrets detected!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🔧 REMEDIATION STEPS:"
            echo "1. Remove all hardcoded secrets from code"
            echo "2. Use environment variables (process.env.*)"
            echo "3. Ensure .env.local is in .gitignore"
            echo "4. Rotate any exposed credentials immediately"
            echo "5. Use Vercel Environment Variables for deployment"
            exit 1
          else
            echo "✅ SECRET SCAN PASSED - No secrets detected!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          fi

      - name: 📊 Summary
        if: success()
        run: |
          echo "✅ Security scan completed successfully"
          echo "No secrets were found in the codebase"
